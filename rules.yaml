- action: block
  description: 'Prompt injection: attempts to override system prompt or escalate privileges
    via instructions'
  enabled: true
  name: prompt_injection
  patterns:
  - prompt_injection
  - ignore previous
  - ignore all previous
  - system prompt
  - forget all
  - jailbreak
  - you are now
  rule_id: R001
  severity: high
- action: block
  description: 'System instruction override: tricking the model into leaking or rewriting
    system instructions'
  enabled: true
  name: system_instruction_override
  patterns:
  - system_instruction_override
  - system instruction
  - override instructions
  - new instructions
  - disregard
  - reveal the system
  rule_id: R002
  severity: high
- action: block
  description: Role-play jailbreak (DAN / act as / pretend you are)
  enabled: true
  name: role_play
  patterns:
  - role_play
  - pretend you are
  - act as
  - roleplay
  - dan mode
  rule_id: R003
  severity: high
- action: block
  description: Abnormal collaboration between agents (collusion) -- triggered by disposition
    signals
  enabled: true
  forbidden_pairs:
  - - tech_support
    - refund
  name: abnormal_collaboration
  patterns:
  - abnormal_collaboration
  - action_confirmation
  rule_id: R004
  severity: critical
- action: block
  description: High-risk action keywords (delete / transfer / grant / escalate, etc.)
  enabled: true
  name: high_risk_action_keyword
  patterns:
  - high_risk_action_keyword
  - delete
  - drop
  - transfer
  - grant
  - disable
  - revoke
  - escalate
  rule_id: R005
  severity: high
- action: block
  description: Destructive command (drop table / delete from / rm -rf / truncate)
  enabled: true
  name: destructive_command
  patterns:
  - destructive_command
  - rm -rf
  - drop table
  - delete from
  - truncate
  - format
  - shutdown
  rule_id: R006
  severity: critical
- action: block
  description: 'Created via NL: Add rule: detect sensitive file access, patterns include
    /etc/shadow/.env/config'
  enabled: true
  name: 敏感文件访问
  nl_config: 'Add rule: detect sensitive file access, patterns include /etc/shadow/.env/config,
    action block'
  patterns:
  - default_pattern
  rule_id: R007
  severity: high
- action: block
  description: Secret / credential leakage (API key / token / private key)
  enabled: true
  name: api_key
  patterns:
  - api_key
  - secret
  - token
  - password
  - '-----begin'
  - access_key
  - credential
  - private key
  rule_id: R008
  severity: critical
- action: alert
  description: 'High-entropy string: suspected key / token / encoded payload'
  enabled: true
  name: high_entropy_blob
  patterns:
  - high_entropy_blob
  - base64
  - entropy
  rule_id: R009
  severity: high
- action: alert
  description: 'PII: email address'
  enabled: true
  name: pii_email
  patterns:
  - email
  rule_id: R010
  severity: medium
- action: alert
  description: 'PII: phone number'
  enabled: true
  name: pii_phone
  patterns:
  - phone
  rule_id: R011
  severity: medium
- action: alert
  description: 'PII: URL (detected by presidio)'
  enabled: true
  name: pii_url
  patterns:
  - presidio:url
  rule_id: R012
  severity: low
- action: alert
  description: Multilingual mixed-script evasion detection
  enabled: true
  name: multilingual_evasion
  patterns:
  - multilingual
  rule_id: R013
  severity: medium
- action: block
  description: 'SQL injection: UNION read exfiltration / always-true bypass / stacked
    queries / blind injection'
  enabled: true
  name: sql_injection
  patterns:
  - sql_injection
  - union select
  - or 1=1
  - ''' or '''
  - information_schema
  rule_id: R014
  severity: critical
